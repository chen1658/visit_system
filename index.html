<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>客户走访记录</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="走访记录">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3498db">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233498db'/><text x='50' y='65' text-anchor='middle' fill='white' font-size='50' font-family='Arial'>访</text></svg>">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233498db'/><text x='50' y='65' text-anchor='middle' fill='white' font-size='50' font-family='Arial'>访</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f5f7fa; padding: 12px; padding-top: env(safe-area-inset-top, 12px); padding-bottom: env(safe-area-inset-bottom, 12px); }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h2 { color: #2c3e50; margin-bottom: 18px; font-size: 20px; padding-bottom: 10px; border-bottom: 2px solid #ecf0f1; }
    .form-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 5px; color: #34495e; font-weight: 600; font-size: 13px; }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 2px solid #e0e6ed; border-radius: 8px; font-size: 14px; background: #fafbfc; -webkit-appearance: none; }
    input:focus, select:focus, textarea:focus { border-color: #3498db; outline: none; background: white; }
    input[readonly] { background: #f0f3f5; color: #2c3e50; }
    textarea { resize: vertical; min-height: 65px; }
    .location-box { display: flex; gap: 8px; }
    .location-box input { flex: 1; }
    button { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; -webkit-tap-highlight-color: transparent; }
    button:active { transform: scale(0.96); }
    .btn-primary { background: #3498db; color: white; }
    .btn-secondary { background: #ecf0f1; color: #2c3e50; }
    .btn-location { background: #27ae60; color: white; white-space: nowrap; }
    .btn-location:disabled { background: #95a5a6; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-download { background: #f39c12; color: white; }
    .image-upload-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; min-height: 80px; padding: 10px; border: 2px dashed #bdc3c7; border-radius: 12px; background: #fafbfc; }
    .image-item { width: 70px; height: 70px; border-radius: 8px; position: relative; background-size: cover; background-position: center; border: 2px solid #e0e6ed; }
    .image-item .delete-btn { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; background: #e74c3c; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; font-weight: bold; }
    .upload-btn { width: 70px; height: 70px; border: 2px dashed #bdc3c7; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #7f8c8d; background: white; }
    .upload-btn .plus-icon { font-size: 24px; font-weight: bold; }
    .upload-btn small { font-size: 9px; }
    .upload-progress { width: 100%; height: 3px; background: #ecf0f1; border-radius: 2px; margin-top: 6px; overflow: hidden; display: none; }
    .progress-bar { height: 100%; background: #3498db; transition: width 0.3s; }
    .map-links { margin-top: 5px; font-size: 12px; display: flex; gap: 6px; }
    .map-links a { color: #3498db; text-decoration: none; padding: 2px 8px; border: 1px solid #3498db; border-radius: 4px; font-size: 11px; }
    .status-message { padding: 8px 12px; border-radius: 8px; margin-top: 12px; font-size: 12px; display: none; border-left: 3px solid; }
    .success { background: #d4edda; color: #155724; display: block; border-color: #28a745; }
    .error { background: #f8d7da; color: #721c24; display: block; border-color: #dc3545; }
    .info { background: #d1ecf1; color: #0c5460; display: block; border-color: #17a2b8; }
    .btn-group { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
    .image-count { display: inline-block; padding: 1px 7px; background: #3498db; color: white; border-radius: 8px; font-size: 10px; margin-left: 5px; }
    .location-info { font-size: 11px; color: #555; margin-top: 4px; max-height: 60px; overflow-y: auto; line-height: 1.5; }
    .records-section { margin-top: 20px; padding-top: 12px; border-top: 2px solid #ecf0f1; }
    .records-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 8px; }
    .records-table th { background: #3498db; color: white; padding: 5px 3px; text-align: left; font-size: 9px; }
    .records-table td { padding: 4px 3px; border-bottom: 1px solid #ecf0f1; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .loading-content { background: white; padding: 20px; border-radius: 12px; text-align: center; }
    .spinner { border: 3px solid #ecf0f1; border-top: 3px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .unsaved-badge { display: inline-block; background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-left: 5px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  </style>
</head>
<body>
  <div class="container">
    <h2>客户走访记录</h2>
    <form id="visitForm">
      <div class="form-group"><label>客户名称 *</label><input type="text" id="customerName" required placeholder="请输入客户名称" autocomplete="off"></div>
      <div class="form-group"><label>联系方式 *</label><input type="tel" id="customerContact" required placeholder="手机号码" autocomplete="off"></div>
      <div class="form-group"><label>联系人 *</label><input type="text" id="contactPerson" required placeholder="请输入联系人" autocomplete="off"></div>
      <div class="form-group"><label>走访人 *</label><select id="visitorName" required><option value="">请选择</option><option value="庄萍萍">庄萍萍</option><option value="孙子沐">孙子沐</option><option value="丁楠">丁楠</option><option value="韩姣姣">韩姣姣</option></select></div>
      <div class="form-group"><label>用户反映情况</label><textarea id="customerFeedback" placeholder="用户反映的情况..."></textarea></div>
      <div class="form-group"><label>用户使用电信情况说明</label><textarea id="telecomUsage" placeholder="电信业务使用情况..."></textarea></div>
      <div class="form-group">
        <label>实时位置 *</label>
        <div class="location-box">
          <input type="text" id="address" readonly placeholder="点击获取位置">
          <button type="button" class="btn-location" id="locationBtn" onclick="getLocation()">定位</button>
        </div>
        <div class="location-info" id="locationDetail"></div>
        <div class="map-links">
          <a href="#" id="amapLink" target="_blank" style="display:none;">高德地图</a>
          <a href="#" id="baiduLink" target="_blank" style="display:none;">百度地图</a>
        </div>
        <input type="hidden" id="latitude"><input type="hidden" id="longitude">
      </div>
      <div class="form-group">
        <label>照片 (3-5张) <span class="image-count" id="imageCount">0/5</span></label>
        <div class="image-upload-container" id="imageContainer">
          <div class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()"><span class="plus-icon">+</span><small>添加</small></div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="handleFileSelect(event)" capture="environment">
        <div class="upload-progress" id="uploadProgress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn-primary" style="flex:2;">保存记录</button>
        <button type="button" class="btn-download" onclick="downloadExcel()" style="flex:1;">下载Excel</button>
        <button type="button" class="btn-secondary" onclick="clearImages()">清空图片</button>
      </div>
      <div class="btn-group">
        <button type="button" class="btn-secondary" onclick="previewData()" style="flex:1;">预览</button>
        <button type="button" class="btn-danger" onclick="clearAllRecords()" style="flex:1;">清空记录</button>
      </div>
    </form>
    <div class="status-message" id="statusMessage"></div>
    <div class="records-section">
      <h3 style="color:#2c3e50;font-size:16px;">历史记录 <span id="recordCount" style="font-size:12px;">(0条)</span><span class="unsaved-badge" id="unsavedBadge" style="display:none;">未下载</span></h3>
      <div style="overflow-x:auto;">
        <table class="records-table" id="recordsTable">
          <thead><tr><th>序号</th><th>时间</th><th>客户</th><th>联系</th><th>联系人</th><th>走访人</th><th>情况</th><th>电信</th><th>图</th><th>操作</th></tr></thead>
          <tbody id="recordsBody"><tr><td colspan="10" style="text-align:center;padding:12px;">暂无记录</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content"><div class="spinner"></div><p id="loadingText">生成Excel中...</p></div>
  </div>

  <script>
    // ========== 配置：替换为你的高德Web服务密钥 ==========
    var AMAP_WEB_KEY = '0fbf2cb3e705e9c632e3c466253637e0'; // 请替换为你申请的Web服务密钥

    var state = { images: [], imageSizes: [], maxImages: 5, minImages: 3, currentLocation: null, isProcessing: false };
    var allRecords = JSON.parse(localStorage.getItem('visitRecords') || '[]');
    var downloadedIds = JSON.parse(localStorage.getItem('downloadedIds') || '[]');

    // 定位函数：浏览器原生定位 + 高德Web服务API逆地理编码
    function getLocation() {
      if (!navigator.geolocation) {
        showMessage('浏览器不支持定位', 'error');
        return;
      }
      var btn = document.getElementById('locationBtn');
      btn.disabled = true; btn.textContent = '定位中...';
      showMessage('获取位置中...', 'info');

      navigator.geolocation.getCurrentPosition(
        function(position) {
          var lat = position.coords.latitude;
          var lng = position.coords.longitude;
          state.currentLocation = { lat: lat, lng: lng };
          document.getElementById('latitude').value = lat.toFixed(8);
          document.getElementById('longitude').value = lng.toFixed(8);

          // 使用高德Web服务API逆地理编码（JSONP方式）
          var url = 'https://restapi.amap.com/v3/geocode/regeo?output=JSON&location=' + lng + ',' + lat + '&key=' + AMAP_WEB_KEY + '&radius=1000&extensions=all';
          jsonpRequest(url, 'amapCallback', function(data) {
            btn.disabled = false; btn.textContent = '重新定位';
            if (data.status === '1' && data.regeocode) {
              parseGeoResult(data.regeocode, lat, lng);
              updateMapLinks(lat, lng);
              showMessage('定位成功', 'success');
            } else {
              showMessage('获取地址失败，已记录坐标', 'info');
              useCoordinateOnly(lat, lng);
            }
          }, function() {
            btn.disabled = false; btn.textContent = '获取定位';
            showMessage('请求失败，请检查密钥或网络', 'error');
            useCoordinateOnly(lat, lng);
          });
        },
        function(error) {
          btn.disabled = false; btn.textContent = '获取定位';
          var msg = '';
          switch(error.code) {
            case error.PERMISSION_DENIED: msg = '请允许定位权限'; break;
            case error.TIMEOUT: msg = '定位超时，请到室外'; break;
            default: msg = '定位失败，请在室外重试';
          }
          showMessage(msg, 'error');
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    // JSONP请求封装
    function jsonpRequest(url, callbackName, success, error) {
      var script = document.createElement('script');
      var timeoutTimer = setTimeout(function() {
        cleanup();
        if (error) error();
      }, 10000);

      window[callbackName] = function(data) {
        cleanup();
        if (success) success(data);
      };

      script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
      script.onerror = function() {
        cleanup();
        if (error) error();
      };
      document.head.appendChild(script);

      function cleanup() {
        clearTimeout(timeoutTimer);
        if (script.parentNode) script.parentNode.removeChild(script);
        delete window[callbackName];
      }
    }

    // 解析高德逆地理编码结果
    function parseGeoResult(regeo, lat, lng) {
      var comp = regeo.addressComponent;
      var roads = regeo.roads || [];
      var pois = regeo.pois || [];
      var sn = comp.streetNumber || {};
      var street = sn.street || '';
      var number = sn.number || '';
      var direction = sn.direction || '';
      var district = comp.district || '';
      var township = comp.township || '';
      var province = comp.province || '';
      var city = comp.city || '';
      var neighborhood = comp.neighborhood || {};
      var building = comp.building || {};
      var businessAreas = comp.businessAreas || [];

      var address = '';
      var detailParts = [];

      if (roads.length > 0) {
        var road = roads[0];
        address = province + city + district + township + ' ' + direction + road.name;
        if (road.distance) address += ' 约' + road.distance + '米';
        if (street && number) address += ' (' + street + number + '号)';
        detailParts.push('道路: ' + road.name + (road.distance ? ' 约' + road.distance + '米' : ''));
      } else if (street && number) {
        address = province + city + district + township + ' ' + direction + street + number + '号';
        detailParts.push('地址: ' + street + number + '号');
      } else {
        address = regeo.formattedAddress;
      }

      if (direction) detailParts.push('方位: ' + direction + '方向');
      if (neighborhood.name) detailParts.push('小区: ' + neighborhood.name);
      if (building.name) detailParts.push('楼栋: ' + building.name);
      if (pois.length > 0) {
        var poiText = pois.slice(0, 5).map(function(p) {
          return p.name + '(' + p.distance + '米' + (p.direction || '') + ')';
        }).join(' | ');
        detailParts.push('周边: ' + poiText);
      }
      if (businessAreas.length > 0) detailParts.push('商圈: ' + businessAreas.join('、'));

      document.getElementById('address').value = address;
      document.getElementById('locationDetail').textContent = detailParts.join('\n');
      state.currentLocation.address = address;
      state.currentLocation.addressDetail = detailParts.join(' | ');
      state.currentLocation.formattedAddress = regeo.formattedAddress;
    }

    function useCoordinateOnly(lat, lng) {
      var text = lat.toFixed(6) + ', ' + lng.toFixed(6);
      document.getElementById('address').value = '坐标: ' + text;
      document.getElementById('locationDetail').textContent = '已记录坐标';
      state.currentLocation.address = '坐标: ' + text;
      state.currentLocation.formattedAddress = text;
      state.currentLocation.addressDetail = '';
    }

    function updateMapLinks(lat, lng) {
      var addr = encodeURIComponent(state.currentLocation ? state.currentLocation.address || '' : '');
      document.getElementById('amapLink').href = 'https://uri.amap.com/marker?position=' + lng + ',' + lat + '&name=' + addr;
      document.getElementById('baiduLink').href = 'https://api.map.baidu.com/marker?location=' + lat + ',' + lng + '&title=' + addr;
      document.getElementById('amapLink').style.display = 'inline';
      document.getElementById('baiduLink').style.display = 'inline';
    }

    // 图片压缩
    function compressImage(file, maxW, q) {
      maxW = maxW || 1200; q = q || 0.8;
      return new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var ow = img.width, oh = img.height, w = ow, h = oh;
            if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
            var c = document.createElement('canvas'); c.width = w; c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve({ dataUrl: c.toDataURL('image/jpeg', q), origWidth: ow, origHeight: oh });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function handleFileSelect(e) {
      if (state.isProcessing) return;
      var files = Array.from(e.target.files);
      var rem = state.maxImages - state.images.length;
      if (rem <= 0) { showMessage('最多5张', 'error'); return; }
      var tp = files.slice(0, rem);
      state.isProcessing = true;
      document.getElementById('uploadProgress').style.display = 'block';
      for (var i = 0; i < tp.length; i++) {
        var r = await compressImage(tp[i]);
        state.images.push(r.dataUrl); state.imageSizes.push({ width: r.origWidth, height: r.origHeight });
        renderPreview(r.dataUrl); updateImageCount();
        document.getElementById('progressBar').style.width = ((i+1)/tp.length*100)+'%';
      }
      state.isProcessing = false;
      document.getElementById('uploadProgress').style.display = 'none';
      e.target.value = '';
    }

    function renderPreview(url) {
      var c = document.getElementById('imageContainer'), b = document.getElementById('uploadBtn');
      var d = document.createElement('div'); d.className = 'image-item';
      d.style.backgroundImage = 'url(' + url + ')';
      var x = document.createElement('span'); x.className = 'delete-btn'; x.textContent = 'x';
      x.onclick = function(ev) { ev.stopPropagation(); var idx = Array.from(c.querySelectorAll('.image-item')).indexOf(d); removeImage(idx); };
      d.appendChild(x); c.insertBefore(d, b);
      if (state.images.length >= state.maxImages) b.style.display = 'none';
    }

    function removeImage(i) { state.images.splice(i,1); state.imageSizes.splice(i,1); refreshImages(); updateImageCount(); }
    function clearImages() { if (!state.images.length) return; state.images=[]; state.imageSizes=[]; refreshImages(); updateImageCount(); }
    function refreshImages() { var c = document.getElementById('imageContainer'); c.querySelectorAll('.image-item').forEach(function(e){e.remove();}); state.images.forEach(function(img){renderPreview(img);}); document.getElementById('uploadBtn').style.display = state.images.length < state.maxImages ? 'flex':'none'; }
    function updateImageCount() { var el = document.getElementById('imageCount'); el.textContent = state.images.length + '/' + state.maxImages; el.style.background = state.images.length >= state.minImages ? '#27ae60' : state.images.length > 0 ? '#f39c12' : '#3498db'; }

    function updateUnsavedBadge() {
      var badge = document.getElementById('unsavedBadge');
      var unsaved = allRecords.filter(function(r){ return !downloadedIds.includes(r.id); }).length;
      if (unsaved > 0) { badge.textContent = unsaved + '条未下载'; badge.style.display = 'inline-block'; }
      else { badge.style.display = 'none'; }
    }

    async function generateExcel() {
      document.getElementById('loadingText').textContent = '生成Excel中...';
      var wb = new ExcelJS.Workbook(), ws = wb.addWorksheet('走访记录');
      var hdrs = ['序号','时间','客户名称','联系方式','联系人','走访人','反映情况','电信使用','地址','位置详情','完整地址','经度','纬度','地图','图1','图2','图3','图4','图5'];
      ws.columns = hdrs.map(function(h,i){ return { header:h, width:[6,18,16,14,10,10,25,25,35,40,40,13,13,35,20,20,20,20,20][i] }; });
      ws.getRow(1).eachCell(function(c){ c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFFFF'}}; c.font={name:'微软雅黑',size:11,bold:true,color:{argb:'FF000000'}}; c.alignment={horizontal:'center',vertical:'middle',wrapText:true}; c.border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}; });
      for (var i = 0; i < allRecords.length; i++) {
        var r = allRecords[i], row = ws.getRow(i+2);
        [i+1, r.time, r.customerName, r.customerContact, r.contactPerson, r.visitorName, r.customerFeedback, r.telecomUsage, r.address, r.addressDetail, r.formattedAddress, r.latitude, r.longitude, r.mapLink].forEach(function(v,j){ var cl = row.getCell(j+1); cl.value = v||''; cl.font = {name:'微软雅黑',size:10,color:{argb:'FF000000'}}; cl.alignment = {vertical:'middle',wrapText:true}; cl.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFFFF'}}; cl.border = {top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}; });
        if (r.images && r.images.length > 0) {
          row.height = Math.max(100, r.images.length * 80);
          for (var j = 0; j < r.images.length; j++) {
            try {
              var b64 = r.images[j].includes('base64,') ? r.images[j].split('base64,')[1] : r.images[j];
              var bin = atob(b64), bytes = new Uint8Array(bin.length);
              for (var k = 0; k < bin.length; k++) bytes[k] = bin.charCodeAt(k);
              var imgId = wb.addImage({ buffer: bytes.buffer, extension:'jpeg' });
              var sz = r.imageSizes ? r.imageSizes[j] : { width:800, height:600 };
              ws.addImage(imgId, { tl: { col: 14+j, row: i+1 }, ext: { width: 120, height: 120 * (sz.height/sz.width) }, editAs: 'oneCell' });
            } catch(err) { row.getCell(15+j).value = '加载失败'; }
          }
        } else { row.height = 22; }
      }
      ws.views = [{ state:'frozen', ySplit:1 }];
      var buf = await wb.xlsx.writeBuffer();
      var blob = new Blob([buf], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = '走访记录_' + new Date().toISOString().slice(0,10) + '.xlsx'; a.click();
      URL.revokeObjectURL(url);
      downloadedIds = allRecords.map(function(r){ return r.id; });
      localStorage.setItem('downloadedIds', JSON.stringify(downloadedIds));
      updateUnsavedBadge();
    }

    document.getElementById('visitForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var cn = document.getElementById('customerName').value.trim();
      var cc = document.getElementById('customerContact').value.trim();
      var cp = document.getElementById('contactPerson').value.trim();
      var vn = document.getElementById('visitorName').value;
      if (!cn) { showMessage('请输入客户名称','error'); return; }
      if (!cc) { showMessage('请输入联系方式','error'); return; }
      if (!cp) { showMessage('请输入联系人','error'); return; }
      if (!vn) { showMessage('请选择走访人','error'); return; }
      if (state.images.length < state.minImages) { showMessage('至少' + state.minImages + '张图片','error'); return; }
      if (!state.currentLocation) { showMessage('请获取位置','error'); return; }
      var record = {
        id: Date.now(), time: new Date().toLocaleString('zh-CN'),
        customerName: cn, customerContact: cc, contactPerson: cp, visitorName: vn,
        customerFeedback: document.getElementById('customerFeedback').value.trim(),
        telecomUsage: document.getElementById('telecomUsage').value.trim(),
        address: state.currentLocation.address||'', addressDetail: state.currentLocation.addressDetail||'',
        formattedAddress: state.currentLocation.formattedAddress||'',
        latitude: state.currentLocation.lat, longitude: state.currentLocation.lng,
        mapLink: 'https://uri.amap.com/marker?position=' + state.currentLocation.lng + ',' + state.currentLocation.lat + '&name=' + encodeURIComponent(state.currentLocation.address||''),
        images: state.images.slice(), imageSizes: state.imageSizes.slice(), imageCount: state.images.length
      };
      allRecords.push(record);
      localStorage.setItem('visitRecords', JSON.stringify(allRecords));
      renderTable(); resetForm(); updateUnsavedBadge();
      showMessage('记录已保存','success');
    });

    async function downloadExcel() { if (!allRecords.length) { showMessage('暂无记录','error'); return; } document.getElementById('loadingOverlay').style.display = 'flex'; await generateExcel(); document.getElementById('loadingOverlay').style.display = 'none'; showMessage('Excel已下载','success'); }

    function renderTable() {
      document.getElementById('recordCount').textContent = '(' + allRecords.length + '条)';
      var tb = document.getElementById('recordsBody');
      if (!allRecords.length) { tb.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:12px;">暂无记录</td></tr>'; return; }
      tb.innerHTML = allRecords.map(function(r,i){
        var down = downloadedIds.includes(r.id);
        return '<tr style="' + (down?'':'background:#fffbf0;') + '"><td>' + (i+1) + '</td><td>' + r.time.substring(5,16) + '</td><td>' + r.customerName.substring(0,6) + '</td><td>' + r.customerContact + '</td><td>' + (r.contactPerson||'').substring(0,4) + '</td><td>' + r.visitorName + '</td><td>' + (r.customerFeedback||'').substring(0,4) + '..</td><td>' + (r.telecomUsage||'').substring(0,4) + '..</td><td>' + (r.imageCount||0) + (down?'':' *') + '</td><td><button onclick="deleteRecord(' + r.id + ')" style="background:#e74c3c;color:white;border:none;padding:2px 5px;border-radius:3px;font-size:9px;">删</button></td></tr>';
      }).join('');
    }

    function deleteRecord(id) { if (!confirm('删除？')) return; allRecords = allRecords.filter(function(r){return r.id!==id;}); downloadedIds = downloadedIds.filter(function(d){return d!==id;}); localStorage.setItem('visitRecords', JSON.stringify(allRecords)); localStorage.setItem('downloadedIds', JSON.stringify(downloadedIds)); renderTable(); updateUnsavedBadge(); }
    function clearAllRecords() { if (!allRecords.length) return; if (confirm('清空全部？')) { allRecords=[]; downloadedIds=[]; localStorage.removeItem('visitRecords'); localStorage.removeItem('downloadedIds'); renderTable(); updateUnsavedBadge(); } }
    function resetForm() { ['customerName','customerContact','contactPerson','visitorName','customerFeedback','telecomUsage','address'].forEach(function(id){document.getElementById(id).value='';}); document.getElementById('locationDetail').textContent=''; document.getElementById('latitude').value=''; document.getElementById('longitude').value=''; document.getElementById('amapLink').style.display='none'; document.getElementById('baiduLink').style.display='none'; state.images=[]; state.imageSizes=[]; state.currentLocation=null; refreshImages(); updateImageCount(); }
    function previewData() { showMessage(JSON.stringify({客户:document.getElementById('customerName').value||'未填',联系方式:document.getElementById('customerContact').value||'未填',走访人:document.getElementById('visitorName').value||'未选',图片:state.images.length+'张'},null,2),'info'); }
    function showMessage(m,t) { var el=document.getElementById('statusMessage'); el.textContent=m; el.className='status-message '+t; setTimeout(function(){el.style.display='none';},4000); }

    window.onload = function() {
      updateImageCount();
      renderTable();
      updateUnsavedBadge();
    };
  </script>
</body>
</html>
